
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>City Street Speed Limit Lookup (Local Roads)</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <style>
    html, body {height: 100%; margin:0;}
    #map {height: 100%;}
    .panel { position:absolute; top:10px; left:10px; z-index:1000; background:#fff; padding:12px 14px; border-radius:8px; box-shadow:0 2px 10px rgba(0,0,0,.2); width:330px; }
    .panel h2 { margin:0 0 8px; font:600 16px system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif; }
    .panel label { display:block; margin:6px 0 2px; font-size:12px; }
    .panel input { width:100%; padding:6px 8px; border:1px solid #bbb; border-radius:4px; font-size:14px; }
    .panel button { width:100%; margin-top:8px; padding:8px 10px; background:#16a34a; color:#fff; border:0; border-radius:4px; cursor:pointer; font-size:14px; }
    .panel .small { font-size:11px; color:#444; margin-top:8px; }
    .status { font-size:12px; margin-top:6px; min-height:18px; }
    .results { max-height: 180px; overflow:auto; margin-top:6px; font-size:12px; border-top:1px solid #eee; padding-top:6px; }
    .result-item { padding:4px 0; border-bottom:1px dashed #eee; }
  </style>
</head>
<body>
<div id="map"></div>
<div class="panel">
  <h2>City Street Speed Limit Lookup</h2>
  <label for="lat">Latitude</label>
  <input id="lat" placeholder="e.g., 47.6205"/>
  <label for="lon">Longitude</label>
  <input id="lon" placeholder="e.g., -122.3493"/>
  <label for="rad">Search radius (meters)</label>
  <input id="rad" value="300"/>
  <button id="go">Find nearest local-road speed</button>
  <div class="status" id="status"></div>
  <div class="results" id="results"></div>
  <div class="small">Source: OpenStreetMap via Overpass API. Coverage depends on local mapping; results may be incomplete or outdated. Local city/county datasets can be added if available.</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
const map = L.map('map').setView([47.6062, -122.3321], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);
let pointMarker, nearestLine;

const overpassEndpoints = [
  'https://overpass-api.de/api/interpreter',
  'https://overpass.openstreetmap.ru/api/interpreter',
  'https://overpass.kumi.systems/api/interpreter'
];

function buildQuery(lat, lon, radius) {
  // Query ways (roads) with maxspeed within radius, return geometry and key tags
  return `[
    out:json][timeout:25];
    way(around:${radius},${lat},${lon})["highway"]["maxspeed"]; 
    out geom tags;`;
}

function metersTo(mi) { return (mi * 0.000621371).toFixed(2); }

async function fetchOverpass(query) {
  for (const ep of overpassEndpoints) {
    try {
      const r = await fetch(ep, { method: 'POST', body: query, headers: {'Content-Type':'application/x-www-form-urlencoded'} });
      if (!r.ok) throw new Error('HTTP '+r.status);
      const data = await r.json();
      return data;
    } catch (e) {
      console.warn('Overpass endpoint failed, trying next', ep, e);
    }
  }
  throw new Error('All Overpass endpoints failed. Try again later.');
}

function haversine(lat1, lon1, lat2, lon2){
  const R=6371000; const toRad = d=>d*Math.PI/180;
  const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}

function lineDistanceToPoint(coords, lat, lon){
  // Approximate by checking vertices and mid-segment projections (simple approach)
  let best = Infinity;
  for (let i=0;i<coords.length-1;i++){
    const [lon1, lat1] = coords[i];
    const [lon2, lat2] = coords[i+1];
    // sample mid-point as quick approximation
    const midLat=(lat1+lat2)/2, midLon=(lon1+lon2)/2;
    best = Math.min(best,
      haversine(lat,lon,lat1,lon1),
      haversine(lat,lon,lat2,lon2),
      haversine(lat,lon,midLat,midLon)
    );
  }
  return best;
}

function drawWay(way){
  const coords = way.geometry.map(n=>[n.lat, n.lon]);
  const poly = L.polyline(coords, {color:'#e11d48', weight:4, opacity:0.9});
  poly.addTo(map);
  return poly;
}

async function run(){
  const lat = parseFloat(document.getElementById('lat').value);
  const lon = parseFloat(document.getElementById('lon').value);
  const radius = parseFloat(document.getElementById('rad').value)||300;
  const status = document.getElementById('status');
  const resultsEl = document.getElementById('results');
  resultsEl.innerHTML = '';
  if (!Number.isFinite(lat) || !Number.isFinite(lon)){
    status.textContent = 'Please enter valid decimal degree values.'; return;
  }
  status.textContent = 'Querying OpenStreetMap (local roads with maxspeed)…';
  if (pointMarker) { map.removeLayer(pointMarker); }
  if (nearestLine) { map.removeLayer(nearestLine); }
  pointMarker = L.marker([lat,lon]).addTo(map);
  map.setView([lat,lon], 15);

  const query = 'data=' + encodeURIComponent(buildQuery(lat, lon, radius));
  try {
    const data = await fetchOverpass(query);
    const ways = (data.elements||[]).filter(el => el.type==='way');
    if (ways.length === 0){
      status.textContent = `No OSM roads with a mapped speed limit within ${radius} m.`;
      return;
    }
    // Compute nearest by simple distance to polyline vertices/midpoints
    const withDist = ways.map(w=>{
      const coords = w.geometry.map(g=>[g.lon, g.lat]);
      const d = lineDistanceToPoint(coords, lat, lon);
      return {way:w, dist:d};
    }).sort((a,b)=>a.dist-b.dist);

    const nearest = withDist[0];
    const w = nearest.way;
    const speed = w.tags.maxspeed || 'N/A';
    const name = w.tags.name || '(unnamed road)';

    nearestLine = drawWay(w);
    status.innerHTML = `Nearest local road: <b>${name}</b> · <b>${speed}</b> · ${nearest.dist.toFixed(0)} m away`;

    // List a few nearby roads
    const top = withDist.slice(0,5);
    resultsEl.innerHTML = top.map(({way,dist})=>{
      const speed = way.tags.maxspeed || 'N/A';
      const name = way.tags.name || '(unnamed road)';
      return `<div class='result-item'><b>${name}</b><br/>Speed limit: <b>${speed}</b><br/><span style='color:#555'>${dist.toFixed(0)} m away</span></div>`
    }).join('');

  } catch (e) {
    console.error(e);
    status.textContent = 'Overpass query failed: ' + e.message;
  }
}

document.getElementById('go').addEventListener('click', run);
['lat','lon','rad'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown', e=>{ if(e.key==='Enter') run(); });
});
</script>
</body>
</html>
